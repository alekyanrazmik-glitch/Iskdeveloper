name: Cache bust mobile CSS

on:
  push:
    paths:
      - '.github/workflows/cache-bust-mobile-css.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump version
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('mobile-polish.css?v=20260610', 'mobile-polish.css?v=20260610-4')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add index.html
          git commit -m "Bump mobile CSS cache" || exit 0
          git push
