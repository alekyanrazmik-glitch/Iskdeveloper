# trigger reorder simplify
name: Reorder and simplify mobile

on:
  push:
    paths:
      - '.github/workflows/reorder-mobile-simplify.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Reorder sections and simplify mobile CSS
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          html_path = Path('index.html')
          s = html_path.read_text(encoding='utf-8')

          def take_section(text, section_id):
              pattern = re.compile(r'\n<section\s+id="' + re.escape(section_id) + r'"[\s\S]*?\n</section>\n', re.M)
              m = pattern.search(text)
              if not m:
                  raise SystemExit(f'Section {section_id} not found')
              block = m.group(0)
              text = text[:m.start()] + '\n' + text[m.end():]
              return text, block

          def take_gallery_with_modals(text):
              start = text.find('\n<section id="gallery"')
              if start == -1:
                  raise SystemExit('Gallery section not found')
              marker = '\n<section id="promos"'
              end = text.find(marker, start)
              if end == -1:
                  raise SystemExit('Promos marker not found after gallery')
              block = text[start:end]
              text = text[:start] + '\n' + text[end:]
              return text, block

          about_pos = s.find('<section id="about">')
          projects_pos = s.find('<section id="projects"')
          gallery_pos = s.find('<section id="gallery"')

          if not (projects_pos != -1 and gallery_pos != -1 and about_pos != -1 and projects_pos < gallery_pos < about_pos):
              s, about = take_section(s, 'about')
              s, projects = take_section(s, 'projects')
              s, gallery = take_gallery_with_modals(s)
              insert_marker = '\n<section id="estimates"'
              insert_at = s.find(insert_marker)
              if insert_at == -1:
                  raise SystemExit('Could not locate insertion point after hero')
              ordered = '\n' + projects.strip() + '\n\n' + gallery.strip() + '\n\n' + about.strip() + '\n'
              s = s[:insert_at] + ordered + s[insert_at:]

          html_path.write_text(s, encoding='utf-8')

          css_path = Path('mobile-polish.css')
          css = css_path.read_text(encoding='utf-8') if css_path.exists() else ''
          start = '/* MOBILE SIMPLIFY CHATGPT START */'
          end = '/* MOBILE SIMPLIFY CHATGPT END */'
          if start in css and end in css:
              css = css.split(start, 1)[0].rstrip() + '\n\n' + css.split(end, 1)[1].lstrip()

          simplify = r'''
/* MOBILE SIMPLIFY CHATGPT START */
@media (max-width:768px){
  .hero-lead h1{font-size:28px!important;line-height:1.08!important;max-width:330px!important}
  .hero-lead .hl-badge{font-size:13.5px!important;padding:10px 13px!important}
  .hero .search{display:none!important}
  .slide-body{min-height:540px!important;padding-top:86px!important;padding-bottom:76px!important}
  .slide-body h2{font-size:31px!important;line-height:1.02!important;max-width:285px!important;margin-bottom:10px!important}
  .slide-pill{font-size:13.5px!important;margin-bottom:14px!important;padding:9px 12px!important}
  .slide-strip{grid-template-columns:1fr!important;gap:0!important;margin-bottom:0!important}
  .slide-strip .strip-cell:not(:first-child){display:none!important}
  .strip-cell:first-child{min-height:78px!important;border-radius:18px!important;padding:15px!important}
  .strip-cell:first-child .sc-lbl{font-size:10px!important;letter-spacing:.08em!important}
  .strip-cell:first-child .sc-val{font-size:25px!important;line-height:1.08!important}
  .strip-cell .old{display:none!important}
  .slide-actions{margin-top:12px!important}
  .slide-actions .btn{min-height:52px!important;font-size:15px!important}
  .side-green .icn,.side-green .timer{display:none!important}
  .side-green{padding:22px 20px!important;background:#00bf63!important}
  .side-green h3{font-size:25px!important;line-height:1.08!important;margin-bottom:8px!important}
  .side-green p{font-size:15px!important;line-height:1.38!important;margin-bottom:16px!important}
  #projects{padding-top:44px!important;background:#fff!important}
  #projects .sub-sec{font-size:14.5px!important;margin-bottom:18px!important}
  .proj-grid{gap:16px!important}
  .proj{border-radius:24px!important;padding:12px!important;background:#fff!important;border:1px solid #edf0f4!important;box-shadow:0 16px 42px -34px rgba(15,17,21,.55)!important}
  .proj-img{border-radius:20px!important;margin-bottom:14px!important;aspect-ratio:16/10!important}
  .proj h3{font-size:22px!important;line-height:1.08!important;margin:0 0 6px!important}
  .proj-type{font-size:18px!important;margin:0 0 12px!important}
  .proj-rooms,.proj-est,.proj-pills{display:none!important}
  .proj .btn{min-height:50px!important;border-radius:16px!important}
  #gallery{padding-top:34px!important;background:#f7f9fb!important}
  #gallery .sub-sec{font-size:14.5px!important;margin-bottom:18px!important}
  .obj-grid{gap:16px!important}
  .obj{border-radius:24px!important;background:#fff!important;box-shadow:0 16px 42px -34px rgba(15,17,21,.55)!important}
  .obj-img{aspect-ratio:16/10!important;border-radius:20px 20px 0 0!important}
  .obj-body{padding:16px!important}
  .obj-body h3{font-size:20px!important;line-height:1.12!important}
  .obj-body .ob-area{display:none!important}
  #about{padding-top:42px!important;background:#fff!important}
  #about .adv-grid{gap:12px!important}
  #about .adv{padding:18px!important;border-radius:20px!important;background:#f7f9fb!important;box-shadow:none!important}
  #about .adv .ai{width:40px!important;height:40px!important;font-size:22px!important;margin-bottom:10px!important}
  #about .adv h3{font-size:18px!important;margin-bottom:6px!important}
  #about .adv p{font-size:14px!important;line-height:1.42!important}
  #estimates .est-rows{display:none!important}
  #estimates .est-total{border-radius:0 0 18px 18px!important}
  #calc .calc-table{display:none!important}
}
@media (max-width:420px){
  .slide-body{min-height:520px!important}
  .slide-body h2{font-size:29px!important;max-width:250px!important}
  .strip-cell:first-child .sc-val{font-size:23px!important}
}
/* MOBILE SIMPLIFY CHATGPT END */
'''
          css = css.rstrip() + '\n\n' + simplify.strip() + '\n'
          css_path.write_text(css, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html mobile-polish.css
          git diff --cached --quiet && exit 0
          git commit -m "Simplify mobile and reorder sections"
          git push
